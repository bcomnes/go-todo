name: tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/go_todo?sslmode=disable
      SESSION_COOKIE_SECURE: false

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: go_todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: '1.25.x'
          check-latest: true

      - uses: actions/setup-node@v7
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: make deps

      - name: Apply migrations
        run: make migrate-up

      - name: Verify rollback
        run: |
          make migrate-down
          make migrate-down

      - name: Reapply migrations
        run: make migrate-up

      - name: Validate
        run: make build test

      - name: Verify generated files are current
        run: |
          git diff --exit-code -- go.mod go.sum package-lock.json pkg/web/dist/
          git status --porcelain --untracked-files=all -- go.mod go.sum package-lock.json pkg/web/dist/ > /tmp/go-todo-generated-status
          test ! -s /tmp/go-todo-generated-status
